<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Animation</title>
        <style>
            canvas {
                border:1px solid black;
            }
        </style>
    </head>
    <body>
        <canvas id="myCanvas"
            width="800"
            height="800">
        </canvas>
        <script>
            const canvas=document.getElementById("myCanvas");
            const ctx=canvas.getContext("2d");
            let x=1;
            let x2=1;
            let speed =5;
            let speed2 =6;
            let time =0;
            function animate() {
                time= time+1;
                x=x+speed; // = is "assign"
                       // not equality
                x2=x2+speed2;

                if(time < 150) {
                    //move red
                }
                if (time >160){
                    //move green
                    x2= x2 +speed2;
                }
                      //clear                
                       ctx.clearRect(0,0,800,800);
                       //Draw
                       ctx.fillStyle="green";
                       ctx.fillRect(x,100,10,10);
                       ctx.fillStyle="red";
                       ctx.fillRect(x2,300,10,10)
                       //make the code repeat
                       if (x > 800 || x2 > 800) {
                        x = 1;      // Reset Green position
                        x2 = 1;     // Reset Red position
                        time = 0;   // Reset the timer
}               //animation
                requestAnimationFrame(animate);
            }
            animate();
        </script>
    </body>
</html>
