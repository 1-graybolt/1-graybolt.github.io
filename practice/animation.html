<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Animation</title>
        <style>
            canvas {
                border:1px solid black;
            }
        </style>
    </head>
    <body>
        <canvas id="myCanvas"
            width="800"
            height="800">
        </canvas>
        <script>
            const canvas=document.getElementById("myCanvas");
            const ctx=canvas.getContext("2d");
            let x=1;
            let speed =5;
            function animate() {
                x=x+speed; // = is "assign"
                       // not equality
                if(x>800) {
                    x=0;
                }
                       ctx.clearRect(0,0,800,800);
                       ctx.fillRect(x,100,10,10);
                requestAnimationFrame(animate);
            }
            animate();
        </script>
    </body>
</html>
