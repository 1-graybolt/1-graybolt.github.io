<!DOCTYPE html>
<html lang="en">   
<head>  
<title>Functions</title>
<script src="../js/validate.js"></script>

<h1>Functions</h1>body>
<body>
<script>
//log is a function
console.log("test"); //call or (or execute) it

//we can make our own functions!
function sayHi(){
    console.log("hi");
}
sayHi(); // now we're executing it!
sayHi();
sayHi();

// function can take input
function sayHiToSomeone(who){
    console.log("hi " + who);
}
sayHiToSomeone("Sean");
sayHiToSomeone("Kyle");
// function can take multiple inputs
function sayHiToTwoPeople(who1, who2){  
    console.log("hi " + who1 + " and " + who2);
}
sayHiToTwoPeople("elmo", "bluey");
</script>   

</body>



</html>
